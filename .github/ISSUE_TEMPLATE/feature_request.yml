name: Feature request
description: Suggest a concrete product or engineering improvement.
title: "[feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is missing or painful today?
      placeholder: Switching between providers is easy, but copying settings across them is not.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep it concrete and implementation-aware if possible
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, examples, references, or API/provider constraints
